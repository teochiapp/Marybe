server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Habilitar y configurar compresión Gzip en NGINX
    gzip on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml font/woff2;

    # Fallback para Single Page Applications (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reglas de caché extrema (1 año) para recursos estáticos (Lighthouse / PageSpeed)
    location ~* \.(?:js|css|webp|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|otf)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # index.html sin caché para evitar mostrar versiones viejas de la app tras un redespliegue
    location ~* \.(?:html|htm)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires epoch;
    }
}
