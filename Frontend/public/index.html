  <meta name="theme-color" content="#3E0102" />

  <!-- Preload and load fonts asincrónicamente para no bloquear renderización -->

  <link rel="dns-prefetch" href="https://admin.marybe.surcodes.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Brygada+1918:ital,wght@0,400..700;1,400..700&family=Inter:ital,wght@0,100..900;1,100..900&display=swap">

  </noscript>

  <!-- SEO meta tags -->
  <title>Marybe | Tienda Online</title>
  <meta name="description"
    content="Marybe - Tu farmacia y perfumería de confianza. Encuentra los mejores productos de cuidado personal, salud y hogar con más de 50 años de experiencia." />

    content="farmacia, perfumería, marybe, cuidado personal, salud, belleza, hogar, fragancias, cosméticos" />
  <meta name="author" content="Marybe" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.marybe.com.ar" /> <!-- Reemplazar con dominio real si es distinto -->

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Marybe | Farmacia y Perfumería" />
  <meta property="og:description"
    content="Tu farmacia y perfumería de confianza. Encuentra los mejores productos de cuidado personal, salud y hogar con más de 50 años de experiencia." />
  <meta property="og:image" content="https://www.marybe.com.ar/logo-marybe.png" />
  <meta property="og:image:secure_url" content="https://www.marybe.com.ar/logo-marybe.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Marybe | Farmacia y Perfumería" />
  <meta name="twitter:description"
    content="Tu farmacia y perfumería de confianza. Encuentra los mejores productos de cuidado personal, salud y hogar con más de 50 años de experiencia." />
  <meta name="twitter:image" content="https://www.marybe.com.ar/logo-marybe.png" />
